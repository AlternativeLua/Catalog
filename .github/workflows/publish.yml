name: Publish

on:
  release:
    types: [published]

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  wally:
    name: Publish to wally
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ok-nick/setup-aftman@v0.4.2

      - name: Write wally auth
        run: |
          mkdir -p ~/.wally
          printf 'token = "%s"\n' "${{ secrets.WALLY_AUTH_TOKEN }}" > ~/.wally/auth.toml

      - run: wally publish
